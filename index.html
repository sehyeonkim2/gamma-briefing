<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAMMA 시장 데이터</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'Malgun Gothic', sans-serif; background: #f4f6f9; color: #111; }
.container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }
h1 { font-size: 18px; font-weight: 700; color: #1F3864; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: #666; margin-bottom: 20px; }
.controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
input[type=date] { font-size: 13px; padding: 7px 10px; border: 1px solid #ccc; border-radius: 6px; background: #fff; }
.btn { font-size: 13px; padding: 7px 16px; border-radius: 6px; cursor: pointer; border: none; font-weight: 500; }
.btn-primary { background: #1F3864; color: #fff; }
.btn-primary:hover { background: #2E5496; }
.btn-copy { background: #fff; color: #333; border: 1px solid #ccc; }
.btn-copy:hover { background: #f0f0f0; }
.status { font-size: 12px; color: #666; }
.section { margin-bottom: 20px; }
.section-title { font-size: 11px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
table { width: 100%; border-collapse: collapse; font-size: 12.5px; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
th { background: #1F3864; color: #fff; padding: 7px 10px; text-align: center; font-size: 12px; font-weight: 600; }
th.L { text-align: left; }
td { padding: 6px 10px; text-align: center; border-bottom: 1px solid #f0f0f0; }
td.L { text-align: left; }
tr:last-child td { border-bottom: none; }
tr:nth-child(even) td { background: #fafafa; }
.sub th { background: #D6E4F0; color: #1F3864; }
.gap { width: 10px; background: #f4f6f9 !important; border: none !important; padding: 0 !important; }
.pos { color: #C00000; font-weight: 600; }
.neg { color: #215732; font-weight: 600; }
.spinner { display: inline-block; width: 13px; height: 13px; border: 2px solid #ccc; border-top-color: #1F3864; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 5px; }
@keyframes spin { to { transform: rotate(360deg); } }
.note { font-size: 11px; color: #999; margin-top: 8px; }
</style>
</head>
<body>
<div class="container">
  <h1>GAMMA Morning Market Briefing</h1>
  <p class="subtitle">네이버 금융 자동 수집 — 표 복사 후 Word에 붙여넣기</p>
  <div class="controls">
    <input type="date" id="dt">
    <button class="btn btn-primary" onclick="run()">데이터 불러오기</button>
    <button class="btn btn-copy" onclick="copyAll()">표 전체 복사</button>
    <span class="status" id="st"></span>
  </div>
  <div id="out"></div>
</div>

<script>
(function() {
  const d = new Date(), day = d.getDay();
  d.setDate(d.getDate() - (day===1?3 : day===0?2 : 1));
  document.getElementById('dt').value = d.toISOString().slice(0,10);
})();

const $st = document.getElementById('st');
const $out = document.getElementById('out');
function setStatus(s) { $st.innerHTML = s; }

function cc(v) {
  const s = String(v??'').trim();
  return s.startsWith('+') ? 'pos' : s.startsWith('-') ? 'neg' : '';
}
function tdEl(v, left) {
  return `<td class="${[left?'L':'', cc(v)].filter(Boolean).join(' ')}">${v??'-'}</td>`;
}
function thEl(v, left, cs) {
  return `<th class="${left?'L':''}"${cs?` colspan="${cs}"`:''} >${v}</th>`;
}
function fmtChg(cur, prev, dec) {
  if (cur==null || prev==null) return 'N/A';
  const d = +(cur - prev).toFixed(dec);
  return (d>=0?'+':'') + d.toLocaleString('en', {minimumFractionDigits:dec, maximumFractionDigits:dec});
}
function fmtNum(n, dec) {
  if (n==null) return 'N/A';
  return (+n).toLocaleString('en', {minimumFractionDigits:dec, maximumFractionDigits:dec});
}
function toDateStr(yyyymmdd) {
  return yyyymmdd.slice(0,4)+'-'+yyyymmdd.slice(4,6)+'-'+yyyymmdd.slice(6,8);
}
function shiftDate(yyyymmdd, days) {
  const d = new Date(toDateStr(yyyymmdd));
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0,10).replace(/-/g,'');
}

// 네이버 지수 코드
const IDX_CODE = {KOSPI:'KOSPI', KOSDAQ:'KOSDAQ', N225:'NI225', SSEC:'SHCOMP', FTSE:'UKX', DXY:'USDX'};
// 네이버 환율 Reuters 코드
const FX_CODE  = {USDKRW:'FX_USDKRW', EURUSD:'FX_EURUSD', USDJPY:'FX_USDJPY', USDCNH:'FX_USDCNH'};
// 소수점 자리수
const DEC = {KOSPI:2, KOSDAQ:2, N225:0, SSEC:2, FTSE:0, DXY:3, USDKRW:2, EURUSD:4, USDJPY:2, USDCNH:4};

async function get(url) {
  const r = await fetch(url, {signal: AbortSignal.timeout(12000)});
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

function parseIdxRows(rows, date, dec) {
  if (!rows?.length) return null;
  const sorted = [...rows].sort((a,b) => b.localDate.localeCompare(a.localDate));
  const data = sorted.filter(r => r.localDate <= date);
  if (!data.length) return null;
  const base = parseFloat(data[0].closePrice);
  const d1 = data[1] ? parseFloat(data[1].closePrice) : base;
  const w1 = data[4] ? parseFloat(data[4].closePrice) : base;
  const m1 = parseFloat(data[data.length-1].closePrice);
  return {
    index: base.toLocaleString('ko', {minimumFractionDigits:dec, maximumFractionDigits:dec}),
    '1D': fmtChg(base,d1,dec), '1W': fmtChg(base,w1,dec), '1M': fmtChg(base,m1,dec)
  };
}

function parseFXRows(rows, date, dec) {
  if (!rows?.length) return null;
  const sorted = [...rows].sort((a,b) => b.localDate.localeCompare(a.localDate));
  const data = sorted.filter(r => r.localDate <= date);
  if (!data.length) return null;
  const base = parseFloat(data[0].closePrice);
  const d1 = data[1] ? parseFloat(data[1].closePrice) : base;
  const w1 = data[4] ? parseFloat(data[4].closePrice) : base;
  const m1 = parseFloat(data[data.length-1].closePrice);
  return {
    spot: fmtNum(base, dec),
    '1D': fmtChg(base,d1,dec), '1W': fmtChg(base,w1,dec), '1M': fmtChg(base,m1,dec)
  };
}

const ETF_KW = ['ETF','KODEX','TIGER','KBSTAR','HANARO','ARIRANG','KOSEF','MASTER','ACE','PLUS','SOL'];
function filterETF(list) {
  return (list||[])
    .filter(r => !ETF_KW.some(k => ((r.stockName||r.name||'')).toUpperCase().includes(k)))
    .slice(0,6).map(r => r.stockName||r.name||'');
}

async function run() {
  const date = document.getElementById('dt').value.replace(/-/g,'');
  if (!date) { alert('날짜를 선택하세요'); return; }
  $out.innerHTML = '';
  setStatus('<span class="spinner"></span>수집 중...');

  const from = shiftDate(date, -45);
  const errors = [];

  // ── 1. 지수 (네이버) ───────────────────────────
  setStatus('<span class="spinner"></span>지수 수집 중...');
  const idxKeys = Object.keys(IDX_CODE);
  const idxRes  = await Promise.allSettled(
    idxKeys.map(k => get(`https://m.stock.naver.com/api/index/${IDX_CODE[k]}/price?startTime=${from}&endTime=${date}&timeframe=day`))
  );
  const indices = {};
  idxKeys.forEach((k, i) => {
    const dec = DEC[k] ?? 2;
    if (idxRes[i].status === 'fulfilled') {
      const parsed = parseIdxRows(idxRes[i].value, date, dec);
      indices[k] = parsed || {index:'N/A','1D':'N/A','1W':'N/A','1M':'N/A'};
      if (!parsed) errors.push(k);
    } else {
      indices[k] = {index:'N/A','1D':'N/A','1W':'N/A','1M':'N/A'};
      errors.push(k);
    }
  });

  // DXY: 지수에서 환율 섹션으로 이동
  const dxyData = indices['DXY'];
  delete indices['DXY'];

  // ── 2. 환율 (네이버) ───────────────────────────
  setStatus('<span class="spinner"></span>환율 수집 중...');
  const fxKeys = Object.keys(FX_CODE);
  const fxRes  = await Promise.allSettled(
    fxKeys.map(k => get(`https://m.stock.naver.com/front-api/v1/marketIndex/exchangeHistory?category=exchange&reutersCode=${FX_CODE[k]}&startTime=${from}&endTime=${date}&timeframe=day`))
  );
  const currencies = {};
  fxKeys.forEach((k, i) => {
    const dec = DEC[k] ?? 4;
    if (fxRes[i].status === 'fulfilled') {
      const rows = fxRes[i].value?.result?.list ?? fxRes[i].value?.list ?? fxRes[i].value ?? [];
      const parsed = parseFXRows(rows, date, dec);
      currencies[k] = parsed || {spot:'N/A','1D':'N/A','1W':'N/A','1M':'N/A'};
      if (!parsed) errors.push(k);
    } else {
      currencies[k] = {spot:'N/A','1D':'N/A','1W':'N/A','1M':'N/A'};
      errors.push(k);
    }
  });
  // DXY를 환율에 추가
  currencies['DXY'] = dxyData
    ? {spot: dxyData.index, '1D': dxyData['1D'], '1W': dxyData['1W'], '1M': dxyData['1M']}
    : {spot:'N/A','1D':'N/A','1W':'N/A','1M':'N/A'};

  // ── 3. 한국 시장 ───────────────────────────────
  setStatus('<span class="spinner"></span>한국 시장 수집 중...');
  const dStr = toDateStr(date);
  const [mktR, kudR, qudR, forR, insR, npsR] = await Promise.allSettled([
    get(`https://m.stock.naver.com/front-api/v1/marketIndex/investorTradingByDate?date=${dStr}`),
    get(`https://m.stock.naver.com/front-api/v1/stock/market/updown?market=KOSPI&date=${dStr}`),
    get(`https://m.stock.naver.com/front-api/v1/stock/market/updown?market=KOSDAQ&date=${dStr}`),
    get(`https://m.stock.naver.com/front-api/v1/stock/investorRanking?investorType=3&tradeType=1&market=ALL&date=${dStr}&page=1&pageSize=20`),
    get(`https://m.stock.naver.com/front-api/v1/stock/investorRanking?investorType=4&tradeType=1&market=ALL&date=${dStr}&page=1&pageSize=20`),
    get(`https://m.stock.naver.com/front-api/v1/stock/investorRanking?investorType=7&tradeType=1&market=ALL&date=${dStr}&page=1&pageSize=20`),
  ]);

  const km = {};
  // 거래대금
  if (mktR.status === 'fulfilled') {
    const list = mktR.value?.result?.list ?? mktR.value?.list ?? [];
    const fmtV = v => {
      const n = Math.round((+(v||0)) / 1e8);
      return (n>=0?'+':'') + n.toLocaleString();
    };
    const find = (mkt, inv) => list.find(r =>
      String(r.market||r.marketType||'').includes(mkt) &&
      String(r.investorType||r.investorName||'').includes(inv)
    );
    const kp = find('KOSPI',''); // fallback
    const kq = find('KOSDAQ','');
    // 네이버 API 응답 구조에 따라 분기
    const getAmt = (mkt, inv) => {
      const row = list.find(r =>
        String(r.market||'').toUpperCase().includes(mkt) &&
        String(r.investorType||r.investorName||'').includes(inv)
      );
      return row ? fmtV(row.netBuyAmount ?? row.netBuy ?? 0) : '-';
    };
    km.kospi_ind  = getAmt('KOSPI','개인');
    km.kospi_for  = getAmt('KOSPI','외국');
    km.kospi_ins  = getAmt('KOSPI','기관');
    km.kosdaq_ind = getAmt('KOSDAQ','개인');
    km.kosdaq_for = getAmt('KOSDAQ','외국');
    km.kosdaq_ins = getAmt('KOSDAQ','기관');
  }
  // 상승/하락
  if (kudR.status === 'fulfilled') {
    const d = kudR.value?.result ?? kudR.value ?? {};
    km.kospi_adv = d.upCount ?? d.up ?? '-';
    km.kospi_dec = d.downCount ?? d.down ?? '-';
  }
  if (qudR.status === 'fulfilled') {
    const d = qudR.value?.result ?? qudR.value ?? {};
    km.kosdaq_adv = d.upCount ?? d.up ?? '-';
    km.kosdaq_dec = d.downCount ?? d.down ?? '-';
  }

  const nb = {
    foreign:     forR.status==='fulfilled' ? filterETF(forR.value?.result?.list ?? forR.value?.list ?? []) : [],
    institution: insR.status==='fulfilled' ? filterETF(insR.value?.result?.list ?? insR.value?.list ?? []) : [],
    nps:         npsR.status==='fulfilled' ? filterETF(npsR.value?.result?.list ?? npsR.value?.list ?? []) : [],
  };

  // ── 렌더링 ──────────────────────────────────────
  const IDX_ORDER = ['KOSPI','KOSDAQ','N225','SSEC','FTSE'];
  const CCY_ORDER = ['USDKRW','EURUSD','USDJPY','USDCNH','DXY'];
  const F=nb.foreign, I=nb.institution, N=nb.nps;

  let t1 = `<table>
    <tr>${thEl('Major Global Indices (pt)',false,5)}<th class="gap"></th>${thEl('Currency (pt)',false,5)}</tr>
    <tr class="sub"><th class="L">Category</th><th>Index</th><th>1D</th><th>1W</th><th>1M</th><th class="gap"></th><th class="L">CCY</th><th>Spot</th><th>1D</th><th>1W</th><th>1M</th></tr>`;
  for (let i=0; i<5; i++) {
    const iv = indices[IDX_ORDER[i]] || {index:'N/A','1D':'N/A','1W':'N/A','1M':'N/A'};
    const cv = currencies[CCY_ORDER[i]] || {spot:'N/A','1D':'N/A','1W':'N/A','1M':'N/A'};
    t1 += `<tr>${tdEl(IDX_ORDER[i],true)}${tdEl(iv.index)}${tdEl(iv['1D'])}${tdEl(iv['1W'])}${tdEl(iv['1M'])}<td class="gap"></td>${tdEl(CCY_ORDER[i],true)}${tdEl(cv.spot)}${tdEl(cv['1D'])}${tdEl(cv['1W'])}${tdEl(cv['1M'])}</tr>`;
  }
  t1 += '</table>';

  const KMR = [
    ['상승 종목 수',        km.kospi_adv,  km.kosdaq_adv],
    ['하락 종목 수',        km.kospi_dec,  km.kosdaq_dec],
    ['개인 거래대금(억)',   km.kospi_ind,  km.kosdaq_ind],
    ['외국인 거래대금(억)', km.kospi_for,  km.kosdaq_for],
    ['기관 거래대금(억)',   km.kospi_ins,  km.kosdaq_ins],
  ];
  let t2 = `<table>
    <tr>${thEl('Korean Market Indicators',false,3)}<th class="gap"></th>${thEl('Net buy value (순매수 상위, ETF 제외)',false,3)}</tr>
    <tr class="sub"><th></th><th>KOSPI</th><th>KOSDAQ</th><th class="gap"></th><th class="L">외국인</th><th class="L">기관</th><th class="L">NPS(연기금)</th></tr>`;
  for (let i=0; i<6; i++) {
    const [lb,kv,qv] = KMR[i]||['','',''];
    t2 += `<tr>${tdEl(lb,true)}${tdEl(kv)}${tdEl(qv)}<td class="gap"></td>${tdEl(F[i]||'',true)}${tdEl(I[i]||'',true)}${tdEl(N[i]||'',true)}</tr>`;
  }
  t2 += '</table>';

  $out.innerHTML = `
    <div class="section"><div class="section-title">지수 · 환율</div>${t1}</div>
    <div class="section"><div class="section-title">한국 시장</div>${t2}</div>
    ${errors.length ? `<p class="note">⚠ N/A: ${errors.join(', ')}</p>` : ''}`;

  setStatus(errors.length ? `완료 (${errors.length}개 N/A)` : '완료 ✓');
}

function copyAll() {
  const tables = $out.querySelectorAll('table');
  if (!tables.length) { alert('먼저 데이터를 불러오세요'); return; }
  let text = '';
  tables.forEach(t => {
    t.querySelectorAll('tr').forEach(row => {
      const cells = [...row.querySelectorAll('th,td')]
        .filter(c => !c.classList.contains('gap'))
        .map(c => c.textContent.trim());
      text += cells.join('\t') + '\n';
    });
    text += '\n';
  });
  navigator.clipboard.writeText(text).then(() => setStatus('복사 완료 ✓'));
}
</script>
</body>
</html>
